<!DOCTYPE html>
<html lang="ckb" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پێشانگای زۆزک</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @font-face {
            font-family: 'KDG';
            src: url('KDG.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root, [data-theme="light"] {
            --accent: #1A6FB5;
            --accent-light: #3A9AE8;
            --accent-subtle: rgba(26,111,181,0.10);
            --accent-border: rgba(26,111,181,0.25);
            --bg:       #F0F6FF;
            --surface:  #E0EDFB;
            --surface2: #CCE0F7;
            --surface3: #B5D0F0;
            --text:       #0A1A30;
            --text-muted: #3A6090;
            --text-dim:   #7AAAD0;
            --border:       rgba(26,111,181,0.15);
            --border-strong: rgba(26,111,181,0.35);
            --header-bg: rgba(240,246,255,0.96);
            --filter-bg: rgba(240,246,255,0.98);
            --card-bg:   #FFFFFF;
            --card-hover:#EEF5FF;
            --input-bg:  #E8F1FD;
            --modal-bg:  #F0F6FF;
            --skeleton-base: #D0E4F7;
            --skeleton-shine: #E8F2FC;
            --menu-bg: rgba(240,246,255,0.98);
        }

        [data-theme="dark"] {
            --accent: #3A9AE8;
            --accent-light: #70C0FF;
            --accent-subtle: rgba(58,154,232,0.10);
            --accent-border: rgba(58,154,232,0.22);
            --bg:       #070E1A;
            --surface:  #0D1828;
            --surface2: #132035;
            --surface3: #1A2B45;
            --text:       #E8F3FF;
            --text-muted: #6A9FC8;
            --text-dim:   #3A6080;
            --border:       rgba(58,154,232,0.13);
            --border-strong: rgba(58,154,232,0.32);
            --header-bg: rgba(7,14,26,0.96);
            --filter-bg: rgba(7,14,26,0.98);
            --card-bg:   #0D1828;
            --card-hover:#132035;
            --input-bg:  #132035;
            --modal-bg:  #0D1828;
            --skeleton-base: #132035;
            --skeleton-shine: #1A2B45;
            --menu-bg: rgba(7,14,26,0.98);
        }

        body {
            font-family: 'KDG', 'Almarai', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
        }

        /* ===== HEADER ===== */
        header {
            position: sticky; top: 0; z-index: 100;
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 1rem;
            transition: background 0.3s;
        }
        .header-inner {
            max-width: 1280px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            height: 64px; gap: 1rem;
        }
        .logo { cursor: pointer; display: flex; flex-direction: column; line-height: 1.1; }
        .logo-main { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
        .logo-sub { font-size: 0.6rem; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; }

        /* hamburger button */
        .hamburger-btn {
            background: transparent;
            border: 1px solid var(--border-strong);
            color: var(--text);
            width: 42px; height: 42px;
            border-radius: 10px;
            cursor: pointer;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 5px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .hamburger-btn:hover { border-color: var(--accent); background: var(--accent-subtle); }
        .hamburger-btn span {
            display: block;
            width: 20px; height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: all 0.3s;
        }
        .hamburger-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger-btn.open span:nth-child(2) { opacity: 0; }
        .hamburger-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* ===== DROPDOWN MENU ===== */
        .dropdown-menu {
            position: absolute;
            top: 64px; left: 0; right: 0;
            background: var(--menu-bg);
            border-bottom: 1px solid var(--border-strong);
            backdrop-filter: blur(20px);
            z-index: 99;
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
            opacity: 0;
        }
        .dropdown-menu.open {
            max-height: 300px;
            opacity: 1;
        }
        .menu-inner {
            max-width: 1280px; margin: 0 auto;
            padding: 1rem;
            display: flex; flex-direction: column; gap: 0.5rem;
        }
        .menu-item {
            display: flex; align-items: center; gap: 0.85rem;
            padding: 0.85rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-family: 'KDG', 'Almarai', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            justify-content: flex-end;
        }
        .menu-item:hover { border-color: var(--accent); background: var(--accent-subtle); color: var(--accent); }
        .menu-item-icon { font-size: 1.3rem; flex-shrink: 0; }
        .menu-divider { height: 1px; background: var(--border); margin: 0.25rem 0; }
        .menu-item.admin-item { color: var(--text-muted); font-size: 0.85rem; }

        /* ===== HERO SLIDESHOW ===== */
        .hero {
            border-bottom: 1px solid var(--border);
            position: relative; overflow: hidden;
            height: 480px;
        }
        @media (max-width: 600px) { .hero { height: 360px; } }

        .hero-slide {
            position: absolute; inset: 0;
            opacity: 0; transition: opacity 1s ease;
        }
        .hero-slide.active { opacity: 1; }
        .hero-slide img {
            width: 100%; height: 100%; object-fit: cover;
            object-position: center;
        }
        .hero-slide::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
        }
        .hero-content {
            position: absolute; inset: 0; z-index: 2;
            display: flex; align-items: flex-end;
            padding: 2rem 1.25rem;
        }
        .hero-text { width: 100%; text-align: right; }
        .hero-title {
            font-size: clamp(1.5rem, 5vw, 3rem); font-weight: 700;
            color: #ffffff; line-height: 1.2; margin-bottom: 0.5rem;
            text-shadow: 0 2px 12px rgba(0,0,0,0.6);
        }
        .hero-title strong { color: var(--accent-light); }
        .hero-dots {
            position: absolute; bottom: 1.25rem; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 0.5rem; z-index: 3;
        }
        .hero-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(255,255,255,0.35);
            border: none; cursor: pointer; padding: 0;
            transition: all 0.3s;
        }
        .hero-dot.active { background: var(--accent-light); width: 24px; border-radius: 4px; }

        /* WAVE */
        .wave-divider {
            width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent-light), var(--accent), transparent);
            opacity: 0.5;
        }

        /* ===== FILTERS ===== */
        .filters-bar {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 64px; z-index: 90;
            background: var(--filter-bg); backdrop-filter: blur(10px);
            transition: background 0.3s;
        }
        .filters-inner { max-width: 1280px; margin: 0 auto; display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
        .search-wrap { flex: 1; min-width: 0; position: relative; }
        .search-icon { position: absolute; right: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 1rem; pointer-events: none; }
        .search-wrap input {
            width: 100%; background: var(--input-bg); border: 1px solid var(--border);
            color: var(--text); padding: 0.7rem 2.4rem 0.7rem 0.85rem;
            border-radius: 10px; font-family: 'KDG', 'Almarai', sans-serif; font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s; text-align: right;
        }
        .search-wrap input::placeholder { color: var(--text-dim); }
        .search-wrap input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-subtle); }
        select#categoryFilter {
            background: var(--input-bg); border: 1px solid var(--border); color: var(--text);
            padding: 0.7rem 0.85rem; border-radius: 10px; font-family: 'KDG', 'Almarai', sans-serif;
            font-size: 0.85rem; cursor: pointer; text-align: right;
            min-width: 140px; max-width: 100%;
        }
        select#categoryFilter:focus { outline: none; border-color: var(--accent); }

        /* ===== ADMIN PANEL - moved to bottom ===== */
        #admin-panel {
            max-width: 520px; margin: 2rem auto;
            background: var(--surface); border: 1px solid var(--border-strong);
            border-radius: 16px; padding: 1.5rem;
        }
        #admin-panel h2 { color: var(--accent); font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.25rem; text-align: center; }
        .form-field { margin-bottom: 0.65rem; }
        .form-field input, .form-field select, .form-field textarea {
            width: 100%; background: var(--surface2); border: 1px solid var(--border);
            color: var(--text); padding: 0.7rem 1rem; border-radius: 10px;
            font-family: 'KDG', 'Almarai', sans-serif; font-size: 0.9rem; text-align: right;
            transition: border-color 0.2s;
        }
        .form-field input::placeholder, .form-field textarea::placeholder { color: var(--text-dim); }
        .form-field input:focus, .form-field select:focus, .form-field textarea:focus { outline: none; border-color: var(--accent); }
        .form-field textarea { min-height: 80px; resize: vertical; }

        .btn-gold {
            width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: #fff; border: none; padding: 0.85rem 1.5rem;
            font-family: 'KDG', 'Almarai', sans-serif;
            font-size: 0.95rem; font-weight: 700; cursor: pointer; border-radius: 10px;
            transition: opacity 0.2s, transform 0.15s;
            box-shadow: 0 4px 16px rgba(26,111,181,0.35); margin-top: 0.25rem;
        }
        .btn-gold:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-outline {
            width: 100%; background: transparent; color: var(--text-muted);
            border: 1px solid var(--border); padding: 0.75rem 1.5rem;
            font-family: 'KDG', 'Almarai', sans-serif; font-size: 0.85rem; cursor: pointer;
            border-radius: 10px; transition: all 0.2s; margin-bottom: 0.65rem;
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-subtle); }

        /* ===== GRID & CARDS ===== */
        .grid-wrap { max-width: 1280px; margin: 0 auto; padding: 2rem 1rem; }
        .section-label {
            font-size: 0.7rem; letter-spacing: 0.2em; color: var(--text-muted);
            text-transform: uppercase; margin-bottom: 1.25rem;
            padding-bottom: 0.65rem; border-bottom: 1px solid var(--border);
        }
        .watches-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        @media (min-width: 600px) { .watches-grid { grid-template-columns: repeat(2, 1fr); gap: 1.25rem; } }
        @media (min-width: 900px) { .watches-grid { grid-template-columns: repeat(3, 1fr); gap: 1.5rem; } }
        @media (min-width: 1200px) { .watches-grid { grid-template-columns: repeat(4, 1fr); gap: 1.75rem; } }

        .watch-card {
            background: var(--card-bg);
            padding: 0.85rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            box-shadow: 0 2px 8px rgba(26,111,181,0.07);
            animation: cardIn 0.4s ease both;
        }
        .watch-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 32px rgba(26,111,181,0.18);
            border-color: var(--accent);
            background: var(--card-hover);
        }
        .watch-img-wrap {
            aspect-ratio: 1; overflow: hidden; margin-bottom: 0.75rem;
            border-radius: 12px;
            background: var(--surface);
            display: flex; align-items: center; justify-content: center;
        }
        .watch-img-wrap img {
            width: 100%; height: 100%; object-fit: contain;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .watch-card:hover .watch-img-wrap img { transform: scale(1.06); }
        .watch-category { font-size: 0.6rem; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.3rem; }
        .watch-name { font-size: 0.9rem; font-weight: 700; color: var(--text); margin-bottom: 0.4rem; line-height: 1.3; }
        .watch-price { font-size: 1.1rem; font-weight: 300; color: var(--accent); }
        .watch-price span { font-size: 0.7rem; color: var(--text-dim); margin-right: 0.2rem; }
        .card-actions { display: flex; gap: 0.4rem; margin-top: 0.85rem; }

        .btn-order {
            flex: 1; background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: #fff; border: none;
            padding: 0.55rem 0.5rem; font-family: 'KDG', 'Almarai', sans-serif;
            font-size: 0.78rem; font-weight: 700; cursor: pointer; border-radius: 8px;
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-order:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-detail {
            flex: 1; background: transparent; color: var(--text-muted);
            border: 1px solid var(--border); padding: 0.55rem 0.5rem;
            font-family: 'KDG', 'Almarai', sans-serif; font-size: 0.78rem; cursor: pointer;
            border-radius: 8px; transition: border-color 0.2s, color 0.2s, background 0.2s;
        }
        .btn-detail:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-subtle); }
        .btn-delete {
            display: block; width: 100%; background: transparent; color: #E05555;
            border: 1px solid rgba(224,85,85,0.2); padding: 0.45rem;
            font-family: 'KDG', 'Almarai', sans-serif; font-size: 0.72rem; cursor: pointer;
            border-radius: 7px; margin-top: 0.4rem; transition: all 0.2s;
        }
        .btn-delete:hover { background: rgba(224,85,85,0.1); border-color: #E05555; }

        /* SKELETON */
        @keyframes shimmer {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }
        .skeleton-card { background: var(--card-bg); padding: 0.85rem; border-radius: 16px; border: 1px solid var(--border); }
        .skeleton-img {
            aspect-ratio: 1; margin-bottom: 1rem; border-radius: 12px;
            background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-shine) 50%, var(--skeleton-base) 75%);
            background-size: 200% 100%; animation: shimmer 1.6s ease-in-out infinite;
        }
        .skeleton-line {
            height: 0.6rem; border-radius: 6px; margin-bottom: 0.5rem;
            background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-shine) 50%, var(--skeleton-base) 75%);
            background-size: 200% 100%; animation: shimmer 1.6s ease-in-out infinite;
        }
        .skeleton-line.short { width: 45%; }
        .skeleton-line.medium { width: 70%; }
        .skeleton-line.price { width: 50%; height: 1.1rem; margin-top: 0.2rem; }
        .skeleton-btns { display: flex; gap: 0.4rem; margin-top: 0.85rem; }
        .skeleton-btn {
            flex: 1; height: 2rem; border-radius: 8px;
            background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-shine) 50%, var(--skeleton-base) 75%);
            background-size: 200% 100%; animation: shimmer 1.6s ease-in-out infinite;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== DETAILS PAGE ===== */
        #details-page { max-width: 1280px; margin: 0 auto; padding: 2rem 1rem; }
        .back-btn {
            background: transparent; border: none; color: var(--text-muted);
            font-family: 'KDG', 'Almarai', sans-serif; font-size: 0.85rem; cursor: pointer;
            display: flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem;
            transition: color 0.2s, transform 0.2s;
        }
        .back-btn:hover { color: var(--accent); transform: translateX(-3px); }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }
        @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; gap: 1.5rem; } }
        .detail-img-wrap {
            background: var(--surface); aspect-ratio: 1; border-radius: 20px;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .detail-img-wrap img { width: 100%; height: 100%; object-fit: contain; }
        .detail-cat { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.75rem; }
        .detail-name { font-size: 1.8rem; font-weight: 700; color: var(--text); line-height: 1.2; margin-bottom: 0.75rem; }
        .detail-price { font-size: 2rem; font-weight: 300; color: var(--accent); margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; }
        .detail-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.8; margin-bottom: 2rem; }
        .btn-order-lg {
            width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: #fff; border: none; padding: 1rem;
            font-family: 'KDG', 'Almarai', sans-serif; font-size: 1rem; font-weight: 700;
            cursor: pointer; border-radius: 12px;
            box-shadow: 0 6px 20px rgba(26,111,181,0.35);
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-order-lg:hover { opacity: 0.9; transform: translateY(-2px); }

        /* ===== MODAL ===== */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            display: flex; align-items: flex-end; justify-content: center;
            padding: 0; z-index: 200;
            animation: fadeIn 0.2s ease;
        }
        @media (min-width: 600px) { #modal { align-items: center; padding: 1.5rem; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-box {
            background: var(--modal-bg); border: 1px solid var(--border-strong);
            border-radius: 20px 20px 0 0; padding: 2rem 1.5rem;
            width: 100%; max-width: 480px;
            animation: slideUp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 -8px 40px rgba(26,111,181,0.2);
        }
        @media (min-width: 600px) { .modal-box { border-radius: 20px; box-shadow: 0 24px 64px rgba(26,111,181,0.25); } }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #modal.hidden { display: none; }
        .modal-eyebrow { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.4rem; }
        .modal-title { font-size: 1.25rem; font-weight: 700; color: var(--text); margin-bottom: 1.5rem; }
        .modal-field { margin-bottom: 0.65rem; }
        .modal-field input {
            width: 100%; background: var(--input-bg); border: 1px solid var(--border);
            color: var(--text); padding: 0.8rem 1rem; border-radius: 10px;
            font-family: 'KDG', 'Almarai', sans-serif; font-size: 0.9rem; text-align: right;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .modal-field input::placeholder { color: var(--text-dim); }
        .modal-field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-subtle); }
        .modal-close {
            width: 100%; background: transparent; border: none; color: var(--text-dim);
            font-family: 'KDG', 'Almarai', sans-serif; font-size: 0.85rem; cursor: pointer;
            padding: 0.75rem; margin-top: 0.5rem; transition: color 0.2s;
        }
        .modal-close:hover { color: var(--text-muted); }

        /* MISC */
        .empty-state { text-align: center; padding: 5rem 2rem; grid-column: 1/-1; }
        .empty-icon { font-size: 3rem; color: var(--text-dim); margin-bottom: 1.25rem; }
        .empty-text { font-size: 1rem; color: var(--text-muted); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo" onclick="location.reload()">
            <span class="logo-main">پێشانگای زۆزک</span>
            <span class="logo-sub">..</span>
        </div>
        <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMenu()" title="مێنیو">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
</header>

<!-- Dropdown Menu -->
<div class="dropdown-menu" id="dropdownMenu">
    <div class="menu-inner">
        <a href="https://www.tiktok.com/@peshangay_zozk?_r=1&_t=ZS-97DW3wTTb0C" target="_blank" class="menu-item" onclick="closeMenu()">
            <span>بچۆ بۆ تیکتۆکمان</span>
            <span class="menu-item-icon">🎵</span>
        </a>
        <a href="https://snapchat.com/t/Y4mGWg0h" target="_blank" class="menu-item" onclick="closeMenu()">
            <span>بچۆ بۆ سناپچاتمان</span>
            <span class="menu-item-icon">👻</span>
        </a>
        <div class="menu-divider"></div>
        <button class="menu-item" onclick="menuToggleTheme()">
            <span id="themeLabel">گۆڕینی مۆد</span>
            <span class="menu-item-icon" id="themeIcon">🌙</span>
        </button>
        <div class="menu-divider"></div>
        <button class="menu-item admin-item" onclick="menuToggleAdmin()">
            <span>پانێلی بەڕێوەبەر</span>
            <span class="menu-item-icon">⚙️</span>
        </button>
    </div>
</div>

<div id="main-page">
    <section class="hero">
        <div class="hero-slide active" id="slide-0">
            <img src="pic1.jpg" alt="slide 1">
        </div>
        <div class="hero-slide" id="slide-1">
            <img src="pic2.jpg" alt="slide 2">
        </div>
        <div class="hero-slide" id="slide-2">
            <img src="pic3.jpg" alt="slide 3">
        </div>
        <div class="hero-content">
            <div class="hero-text">
                <h1 class="hero-title">پێشانگای <strong>زۆزک</strong><br>لوتکەی جوانی و کوالێتی لە جیهانی کاتژمێردا</h1>
            </div>
        </div>
        <div class="hero-dots">
            <button class="hero-dot active" onclick="goToSlide(0)"></button>
            <button class="hero-dot" onclick="goToSlide(1)"></button>
            <button class="hero-dot" onclick="goToSlide(2)"></button>
        </div>
    </section>
    <div class="wave-divider"></div>

    <div class="filters-bar">
        <div class="filters-inner">
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" onkeyup="filterWatches()" placeholder="گەڕان بەدوای کاتژمێر...">
            </div>
            <select id="categoryFilter" onchange="filterWatches()">
                <option value="all">هەموو جۆرەکان</option>
            </select>
        </div>
    </div>

    <div class="grid-wrap">
        <div class="section-label">کاتژمێرەکان</div>
        <div class="watches-grid" id="watches-list"></div>
    </div>

    <!-- Admin Panel at bottom -->
    <div id="admin-panel" class="hidden">
        <div style="max-width:520px; margin: 0 auto 3rem; background: var(--surface); border: 1px solid var(--border-strong); border-radius: 16px; padding: 1.5rem;">
            <h2 style="color: var(--accent); font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.25rem; text-align: center;">زیادکردنی کاتژمێری نوێ</h2>
            <div class="form-field"><input type="text" id="name" placeholder="ناوی کاتژمێر"></div>
            <div class="form-field" style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;">
                <input type="number" id="price" placeholder="نرخ" style="background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.7rem 1rem; border-radius: 10px; font-family: 'KDG', 'Almarai', sans-serif; font-size: 0.9rem; text-align: right;">
                <select id="currency" style="background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.7rem 1rem; border-radius: 10px; font-family: 'KDG', 'Almarai', sans-serif; font-size: 0.9rem; text-align: right;">
                    <option value="$">دۆلار ($)</option>
                    <option value="دینار">دینار عێراقی</option>
                </select>
            </div>
            <div class="form-field"><input type="text" id="category" placeholder="جۆر"></div>
            <div class="form-field"><textarea id="description" placeholder="تێبینی و وردەکاری..."></textarea></div>
            <button class="btn-outline" onclick="document.getElementById('imageFile').click()">＋ هەڵبژاردنی وێنە</button>
            <input type="file" id="imageFile" accept="image/*" class="hidden">
            <button class="btn-gold" onclick="addWatch()">تۆمارکردن</button>
        </div>
    </div>
</div>

<div id="details-page" class="hidden">
    <button class="back-btn" onclick="showMain()">← گەڕانەوە بۆ لیست</button>
    <div class="detail-grid">
        <div class="detail-img-wrap"><img id="detailImg" src="" alt=""></div>
        <div class="detail-info">
            <p class="detail-cat" id="detailCategory"></p>
            <h2 class="detail-name" id="detailTitle"></h2>
            <p class="detail-price" id="detailPrice"></p>
            <p class="detail-desc" id="detailDesc"></p>
            <button class="btn-order-lg" onclick="showModalFromDetails()">داواکردن — WhatsApp</button>
        </div>
    </div>
</div>

<div id="modal" class="hidden">
    <div class="modal-box">
        <p class="modal-eyebrow">داواکاری کاتژمێر</p>
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-field"><input type="text" id="custName" placeholder="ناوی تەواو"></div>
        <div class="modal-field"><input type="text" id="custAddress" placeholder="ناونیشان"></div>
        <div class="modal-field"><input type="text" id="custPhone" placeholder="ژمارەی مۆبایل"></div>
        <button class="btn-gold" onclick="sendOrder()">ناردن بە WhatsApp</button>
        <button class="modal-close" onclick="closeModal()">داخستن</button>
    </div>
</div>

<script>
    const supabaseUrl = 'https://pdolbyvzleajbtfwhecz.supabase.co';
    const supabaseKey = 'sb_publishable_WHAYInvpPFVKtG60jVTp9g_b1ySlYk_';
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let allWatches = [], currentWatch = null;
    let isAdmin = localStorage.getItem('isAdmin') === 'true';
    if (isAdmin) document.getElementById('admin-panel').classList.remove('hidden');

    // Theme
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateThemeUI(savedTheme);

    function updateThemeUI(theme) {
        document.getElementById('themeIcon').textContent = theme === 'dark' ? '☀️' : '🌙';
        document.getElementById('themeLabel').textContent = theme === 'dark' ? 'گۆڕین بۆ ڕووناکی' : 'گۆڕین بۆ تاریکی';
    }

    function menuToggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateThemeUI(next);
        closeMenu();
    }

    // Menu
    let menuOpen = false;
    function toggleMenu() {
        menuOpen = !menuOpen;
        document.getElementById('hamburgerBtn').classList.toggle('open', menuOpen);
        document.getElementById('dropdownMenu').classList.toggle('open', menuOpen);
    }
    function closeMenu() {
        menuOpen = false;
        document.getElementById('hamburgerBtn').classList.remove('open');
        document.getElementById('dropdownMenu').classList.remove('open');
    }

    // Close menu when clicking outside
    document.addEventListener('click', function(e) {
        if (menuOpen && !e.target.closest('header') && !e.target.closest('.dropdown-menu')) {
            closeMenu();
        }
    });

    function menuToggleAdmin() {
        if (isAdmin) {
            localStorage.setItem('isAdmin', 'false');
            location.reload();
        } else {
            const p = prompt("پاسۆرد:");
            if (p === "123456") {
                localStorage.setItem('isAdmin', 'true');
                location.reload();
            }
        }
        closeMenu();
    }

    // Skeletons
    function showSkeletons(count = 8) {
        const list = document.getElementById('watches-list');
        list.innerHTML = Array(count).fill('').map(() => `
            <div class="skeleton-card">
                <div class="skeleton-img"></div>
                <div class="skeleton-line short"></div>
                <div class="skeleton-line medium"></div>
                <div class="skeleton-line price"></div>
                <div class="skeleton-btns">
                    <div class="skeleton-btn"></div>
                    <div class="skeleton-btn"></div>
                </div>
            </div>
        `).join('');
    }

    async function fetchWatches() {
        showSkeletons();
        const { data } = await client.from('watches').select('*');
        allWatches = data || [];
        updateCategoryFilter();
        renderWatches(allWatches);
    }

    function updateCategoryFilter() {
        const f = document.getElementById('categoryFilter');
        const cats = [...new Set(allWatches.map(w => w.category).filter(Boolean))];
        f.innerHTML = '<option value="all">هەموو جۆرەکان</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function filterWatches() {
        const s = document.getElementById('searchInput').value.toLowerCase();
        const c = document.getElementById('categoryFilter').value;
        renderWatches(allWatches.filter(w => w.name.toLowerCase().includes(s) && (c === 'all' || w.category === c)));
    }

    function renderWatches(data) {
        const list = document.getElementById('watches-list');
        if (!data.length) {
            list.innerHTML = `<div class="empty-state"><div class="empty-icon">⌚</div><p class="empty-text">هیچ کاتژمێرێک نەدۆزرایەوە</p></div>`;
            return;
        }
        list.innerHTML = data.map((w, i) => `
            <div class="watch-card" style="animation-delay:${i*0.05}s" onclick='showDetails(${JSON.stringify(w).replace(/'/g,"&#39;")})'>
                <div class="watch-img-wrap">
                    <img src="${w.image_url}" alt="${w.name}" loading="lazy">
                </div>
                <p class="watch-category">${w.category || ''}</p>
                <h3 class="watch-name">${w.name}</h3>
                <p class="watch-price">${w.price?.toLocaleString()} <span>${w.currency || '$'}</span></p>
                <div class="card-actions">
                    <button class="btn-order" onclick='event.stopPropagation(); showModal(${JSON.stringify(w).replace(/'/g,"&#39;")})'>داواکردن</button>
                    <button class="btn-detail" onclick='event.stopPropagation(); showDetails(${JSON.stringify(w).replace(/'/g,"&#39;")})'>وردەکاری</button>
                </div>
                ${isAdmin ? `<button class="btn-delete" onclick="event.stopPropagation(); deleteWatch('${w.id}')">سڕینەوە</button>` : ''}
            </div>
        `).join('');
    }

    function showDetails(w) {
        currentWatch = w;
        document.getElementById('main-page').classList.add('hidden');
        document.getElementById('details-page').classList.remove('hidden');
        document.getElementById('detailImg').src = w.image_url;
        document.getElementById('detailTitle').innerText = w.name;
        document.getElementById('detailPrice').innerText = (w.price?.toLocaleString() || '') + ' ' + (w.currency || '$');
        document.getElementById('detailCategory').innerText = w.category || '';
        document.getElementById('detailDesc').innerText = w.description || '';
        window.scrollTo(0, 0);
    }

    function showMain() {
        document.getElementById('details-page').classList.add('hidden');
        document.getElementById('main-page').classList.remove('hidden');
    }
    function showModal(w) {
        currentWatch = w;
        document.getElementById('modalTitle').innerText = w.name;
        document.getElementById('modal').classList.remove('hidden');
    }
    function showModalFromDetails() {
        document.getElementById('modalTitle').innerText = currentWatch.name;
        document.getElementById('modal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    function sendOrder() {
        const name = document.getElementById('custName').value;
        const addr = document.getElementById('custAddress').value;
        const phone = document.getElementById('custPhone').value;
        const img = encodeURI(currentWatch.image_url);
        const msg = `سڵاو، داوای ئەم کاتژمێرەم هەیە:%0A*ناوی کاتژمێر:* ${currentWatch.name}%0A*نرخ:* ${currentWatch.price} ${currentWatch.currency || '$'}%0A*ناوی کڕیار:* ${name}%0A*ناونیشان:* ${addr}%0A*ژمارەی مۆبایل:* ${phone}%0A%0Aوێنەکە:%0A${img}`;
        window.open(`https://wa.me/9647501949469?text=${msg}`, '_blank');
        closeModal();
    }

    async function addWatch() {
        const file = document.getElementById('imageFile').files[0];
        if (!file) return alert("وێنەیەک هەڵبژێرە");
        const safe = Date.now() + "_" + file.name.replace(/[^a-zA-Z0-9.]/g, "_");
        await client.storage.from('watch-images').upload(safe, file);
        const { data } = client.storage.from('watch-images').getPublicUrl(safe);
        const wd = {
            name: document.getElementById('name').value,
            price: parseFloat(document.getElementById('price').value),
            currency: document.getElementById('currency').value,
            category: document.getElementById('category').value,
            description: document.getElementById('description').value,
            image_url: data.publicUrl
        };
        await client.from('watches').insert([wd]);
        alert("سەرکەوتوو بوو!");
        fetchWatches();
    }

    async function deleteWatch(id) {
        if (confirm("دڵنیای لە سڕینەوە؟")) {
            await client.from('watches').delete().eq('id', id);
            fetchWatches();
        }
    }

    fetchWatches();

    // SLIDESHOW - 5 seconds
    let currentSlide = 0;
    const totalSlides = 3;

    function goToSlide(n) {
        document.getElementById('slide-' + currentSlide).classList.remove('active');
        document.querySelectorAll('.hero-dot')[currentSlide].classList.remove('active');
        currentSlide = n;
        document.getElementById('slide-' + currentSlide).classList.add('active');
        document.querySelectorAll('.hero-dot')[currentSlide].classList.add('active');
    }

    setInterval(() => {
        goToSlide((currentSlide + 1) % totalSlides);
    }, 5000);
</script>
</body>
</html>
